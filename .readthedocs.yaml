# Read the Docs build configuration for torch-sla.
# Mirrors the previous GitHub Pages deploy: a CPU torch is installed so autodoc
# can import torch_sla, then the package is installed --no-deps. The English
# docs are built at the site root and the Chinese docs under /zh/ (two separate
# Sphinx projects, as in docs/source/ and docs/source/zh/).
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  commands:
    # autodoc imports torch_sla -> torch; the CPU wheel keeps the build light.
    - pip install torch --index-url https://download.pytorch.org/whl/cpu
    - pip install "numpy<2" scipy sphinx furo sphinx-sitemap
    - pip install -e . --no-deps
    # English docs at the site root.
    - python -m sphinx -b html --keep-going docs/source $READTHEDOCS_OUTPUT/html
    # Chinese docs under /zh/ (its own conf.py inherits the English one).
    - python -m sphinx -b html --keep-going docs/source/zh $READTHEDOCS_OUTPUT/html/zh
